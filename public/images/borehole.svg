<svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A3D73"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E6BB8"/>
      <stop offset="100%" stop-color="#0D4C8F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Ground layers -->
  <rect x="0" y="350" width="800" height="250" fill="#1A1A1A"/>
  <rect x="0" y="380" width="800" height="220" fill="#222222" opacity="0.8"/>
  <!-- Borehole pipe -->
  <rect x="380" y="100" width="40" height="400" rx="20" fill="#444444" stroke="#555555" stroke-width="2"/>
  <rect x="360" y="80" width="80" height="40" rx="8" fill="#555555"/>
  <!-- Water table -->
  <rect x="0" y="480" width="800" height="120" fill="url(#water)" opacity="0.5"/>
  <!-- Pump head -->
  <rect x="370" y="90" width="60" height="30" rx="6" fill="#F7B500"/>
  <rect x="375" y="85" width="50" height="10" rx="4" fill="#FFC83D"/>
  <!-- Water droplets -->
  <circle cx="400" cy="520" r="4" fill="#1E6BB8" opacity="0.6"/>
  <circle cx="420" cy="540" r="3" fill="#1E6BB8" opacity="0.4"/>
  <circle cx="380" cy="550" r="5" fill="#1E6BB8" opacity="0.5"/>
  <circle cx="410" cy="560" r="3" fill="#1E6BB8" opacity="0.3"/>
</svg>