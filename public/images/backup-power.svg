<svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0D4C8F"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-glow)"/>
  <!-- Battery -->
  <rect x="300" y="150" width="200" height="300" rx="20" fill="#1A1A1A" stroke="#333333" stroke-width="3"/>
  <rect x="350" y="120" width="100" height="40" rx="8" fill="#1A1A1A" stroke="#333333" stroke-width="2"/>
  <!-- Battery charge level -->
  <rect x="320" y="195" width="160" height="220" rx="10" fill="#F7B500" opacity="0.15"/>
  <rect x="325" y="200" width="150" height="50" rx="6" fill="#F7B500" opacity="0.9"/>
  <rect x="325" y="258" width="150" height="50" rx="6" fill="#F7B500" opacity="0.7"/>
  <rect x="325" y="316" width="150" height="50" rx="6" fill="#F7B500" opacity="0.5"/>
  <rect x="325" y="374" width="150" height="30" rx="6" fill="#F7B500" opacity="0.3"/>
  <!-- Lightning bolt -->
  <path d="M420 140 L390 220 L430 220 L380 320" stroke="#F7B500" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Connection dots -->
  <circle cx="320" cy="170" r="4" fill="#1E6BB8"/>
  <circle cx="480" cy="170" r="4" fill="#1E6BB8"/>
  <!-- House silhouette -->
  <g opacity="0.4">
    <path d="M600 400 L600 350 L650 300 L700 350 L700 400 Z" fill="#F7B500" opacity="0.15"/>
    <rect x="630" y="370" width="40" height="30" fill="#111111"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="470" width="800" height="130" fill="#0A0A0A"/>
</svg>