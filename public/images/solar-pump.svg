<svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D4C8F"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky2)"/>
  <!-- Sun -->
  <circle cx="200" cy="80" r="40" fill="#F7B500" opacity="0.9"/>
  <circle cx="200" cy="80" r="60" fill="#F7B500" opacity="0.15"/>
  <circle cx="200" cy="80" r="90" fill="#F7B500" opacity="0.08"/>
  <!-- Solar panel -->
  <rect x="60" y="140" width="180" height="100" rx="3" fill="#0D4C8F" stroke="#1E6BB8" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="100" y2="240" stroke="#0A3D73" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="140" x2="140" y2="240" stroke="#0A3D73" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="140" x2="180" y2="240" stroke="#0A3D73" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="170" x2="240" y2="170" stroke="#0A3D73" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="200" x2="240" y2="200" stroke="#0A3D73" stroke-width="1" opacity="0.5"/>
  <!-- Pole -->
  <rect x="145" y="240" width="10" height="60" fill="#555555"/>
  <!-- Pump unit -->
  <rect x="120" y="300" width="60" height="50" rx="6" fill="#F7B500"/>
  <rect x="130" y="310" width="40" height="10" rx="2" fill="#FFC83D"/>
  <!-- Pipe to water -->
  <path d="M150 350 L150 420 Q150 440 170 440 L500 440 Q520 440 520 420 L520 380" stroke="#1E6BB8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Water stream -->
  <path d="M520 380 Q540 390 540 410 Q540 440 520 460" stroke="#1E6BB8" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M520 385 Q550 400 545 420 Q540 450 530 465" stroke="#1E6BB8" stroke-width="3" fill="none" opacity="0.3"/>
  <!-- Crops -->
  <g fill="#8BC34A" opacity="0.6">
    <path d="M560 470 Q565 440 570 470Z"/>
    <path d="M580 470 Q585 435 590 470Z"/>
    <path d="M600 470 Q605 445 610 470Z"/>
    <path d="M620 470 Q625 440 630 470Z"/>
    <path d="M640 470 Q645 430 650 470Z"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="470" width="800" height="130" fill="#0A0A0A"/>
</svg>