<svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D4C8F"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg4)"/>
  <!-- Wrench -->
  <g transform="translate(400,250) rotate(-30)">
    <rect x="-8" y="-100" width="16" height="140" rx="8" fill="#F7B500"/>
    <path d="M-30 -100 Q-30 -130 0 -130 Q30 -130 30 -100 L20 -100 Q20 -115 0 -115 Q-20 -115 -20 -100 Z" fill="#F7B500"/>
    <path d="M-25 -95 L25 -95 L20 -85 L-20 -85 Z" fill="#FFC83D"/>
  </g>
  <!-- Gear -->
  <g transform="translate(300,350)" fill="#1E6BB8" opacity="0.6">
    <circle cx="0" cy="0" r="40"/>
    <rect x="-10" y="-55" width="20" height="110" rx="4"/>
    <rect x="-55" y="-10" width="110" height="20" rx="4"/>
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#0D4C8F"/>
  </g>
  <!-- Small gear -->
  <g transform="translate(500,320)" fill="#1E6BB8" opacity="0.4">
    <circle cx="0" cy="0" r="25"/>
    <rect x="-6" y="-35" width="12" height="70" rx="3"/>
    <rect x="-35" y="-6" width="70" height="12" rx="3"/>
    <rect x="-5" y="-5" width="10" height="10" rx="2" fill="#0D4C8F"/>
  </g>
  <!-- Toolbox -->
  <rect x="200" y="400" width="120" height="70" rx="8" fill="#333333"/>
  <rect x="220" y="380" width="80" height="30" rx="6" fill="#444444"/>
  <rect x="210" y="440" width="100" height="8" rx="3" fill="#555555" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="480" width="800" height="120" fill="#0A0A0A"/>
</svg>